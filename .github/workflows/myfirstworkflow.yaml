name: My First WorkFlow

on:
  workflow_dispatch: # This allows you to manually trigger the workflow from the GitHub Actions tab in your repository.
    inputs:
      username:
        type: string
        description: 'My manual input' # Description of the input field
        required: true # This input is required
        default: 'GitHub User' # Default value for the input field
  push:
      branches:
          - main

  #pull_request:
      #branches:
          #- main

  #schedule:
      #- cron: '0 0 * * *' # This will run the workflow every day at midnight (UTC)

jobs:
    
    first-run:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repo Code
              uses: actions/checkout@v6

            - name: Run few commands
              run: | 
                echo "Hello, World!"
                echo "This is my first workflow"
                echo "This is my current path:" && pwd
                echo "This is the list of files in the current directory:" && ls -la
            
            - name: Print GitHub context information
              run: | 
                echo "Repository: ${{ github.repository }}"
                echo "Event Name: ${{ github.event_name }}"
                echo "Actor: ${{ github.actor }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run Number: ${{ github.run_number }}"
                echo "Job: ${{ github.job }}"
                echo "Branch Ref: ${{ github.ref }}"
                echo "CommitSHA: ${{ github.sha }}"
                echo "Workflow Path: ${{ github.workflow_path }}"

            - name: Print Manual Input
              run: |
                echo "The value of the manual input 'username' is: ${{ github.event.inputs.username || 'GitHub User' }}"
            
            - name: Print Environment Variables
              run: |
                echo "Printing all environment variables:"
                printenv

            - name: Print Secrets and Variables
              run: |
                echo "Printing my first repository secret ${{ secrets.MY_FIRST_SECRET }}"
                echo "Printing my first repository variable ${{ vars.MY_FIRST_VARIABLE }}"

    second-run:
        runs-on: ubuntu-latest
        needs: first-run
        if: failure() # This condition ensures that the second-run job will only execute if the first-run job fails.
        steps:
          - name: Checkout Repo Code
            uses: actions/checkout@v6
          - name: Install ShellCheck
            run: sudo apt-get update && sudo apt-get install -y shellcheck
          - name: Lint shell script
            run: shellcheck ./scripts/tb-myfirst-script.sh


    third-run:
        runs-on: ubuntu-latest
        needs: [first-run, second-run] # This ensures that the third-run job will only execute if both first-run and second-run jobs complete successfully.
        if: success() # This condition ensures that the third-run job will only execute if the preceding jobs complete successfully.
        steps:
          - name: Checkout Repo Code
            uses: actions/checkout@v6
          - name: Validate script syntax
            run: bash -n ./scripts/tb-myfirst-script.sh
          - name: Execute script
            run: |
              chmod +x ./scripts/tb-myfirst-script.sh 
              ./scripts/tb-myfirst-script.sh